  <!-- AGGRESSIVE CACHE BUSTER — Force new version, never wipe real data -->
  <script>
    (function() {
      // Mark that new code is running — persistent.js will check this
      try {
        sessionStorage.setItem('mrLaundryNewCode', 'true');
        localStorage.setItem('mrLaundryCacheCleared_v2', 'true');
      } catch(e) {}

      const cleared = localStorage.getItem('mrLaundryCacheCleared_v2');
      if (!cleared && localStorage.getItem('mrLaundryDB')) {
        try {
          const db = JSON.parse(localStorage.getItem('mrLaundryDB'));
          // Only clear if it's EXACTLY the empty old demo (adminshahzeb + no real orders)
          const isOldDemo = db && db.users && 
            db.users.length <= 2 && 
            db.users.some(u => u.username === 'adminshahzeb') &&
            (!db.orders || db.orders.length === 0);
          if (isOldDemo) {
            localStorage.removeItem('mrLaundryDB');
            localStorage.removeItem('mrLaundrySession');
            localStorage.removeItem('mrLaundryCloudEnabled');
            localStorage.removeItem('mrLaundryFirebaseCfg');
            localStorage.removeItem('mrLaundryShopId');
            localStorage.setItem('mrLaundryCacheCleared_v2', 'true');
            window.location.reload(true);
          }
        } catch(e) {}
        localStorage.setItem('mrLaundryCacheCleared_v2', 'true');
      }
    })();
  </script>
