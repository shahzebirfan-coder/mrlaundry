<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IT Brand Locker Tool - CelineSoft</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 400px; }
    h2 { margin-top: 0; color: #4f7cff; text-align: center; }
    label { display: block; margin-top: 15px; font-size: 13px; color: #94a3b8; }
    input { width: 100%; padding: 10px; margin-top: 5px; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 25px; background: #4f7cff; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #3b82f6; }
    .note { font-size: 11px; color: #64748b; margin-top: 15px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>

<div class="card">
  <h2>🔒 IT Brand Locker Tool</h2>
  <p style="font-size: 13px; text-align: center; color: #cbd5e1; margin-bottom: 25px;">Generate a secure, encrypted IT Core file for your POS client deployments.</p>

  <label>IT Brand Name</label>
  <input type="text" id="bName" value="CelineSoft">

  <label>Brand Tagline</label>
  <input type="text" id="bTag" value="Empowering Businesses with Smart Code">

  <label>IT Contact Phone</label>
  <input type="text" id="bPhone" value="+92 302 8244803">

  <label>IT Contact Email</label>
  <input type="text" id="bEmail" value="shahzeb.irfan@gmail.com">

  <label>Secret IT Admin Password</label>
  <input type="text" id="bPwd" value="ITAdmin@123">

  <button onclick="generateFile()">📥 Download Locked Core File</button>

  <div class="note">
    Upload the downloaded <b>it-core.js</b> file to the <b>assets/js/</b> folder of your POS to securely overwrite the IT brand details before sending it to a client.
  </div>
</div>

<script>
  function generateFile() {
    const n = btoa(document.getElementById('bName').value);
    const t = btoa(document.getElementById('bTag').value);
    const p = btoa(document.getElementById('bPhone').value);
    const e = btoa(document.getElementById('bEmail').value);
    const pwd = btoa(document.getElementById('bPwd').value);

    const jsCode = `// CelineSoft Encrypted IT Core
window._IT_BRAND = {
  n: atob('${n}'),
  t: atob('${t}'),
  p: atob('${p}'),
  e: atob('${e}'),
  pwd: atob('${pwd}')
};`;

    const blob = new Blob([jsCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'it-core.js';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
