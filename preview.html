const $  = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}

function escapeHtml(str){
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtMoney(n) {
  const s = DB.settings();
  const v = (Number(n) || 0).toFixed(0);
  return `${s.currency} ${Number(v).toLocaleString()}`;
}

function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtDateShort(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function isoDay(d=new Date()) { return d.toISOString().slice(0,10); }

function getGreeting() {
  const h = new Date().getHours();
  const useT = (typeof t === 'function');
  if (h < 12) return { text: useT ? t('greet.morning') : 'Good Morning', emoji: '🌅' };
  if (h < 17) return { text: useT ? t('greet.afternoon') : 'Good Afternoon', emoji: '☀️' };
  if (h < 21) return { text: useT ? t('greet.evening') : 'Good Evening', emoji: '🌇' };
  return { text: useT ? t('greet.night') : 'Good Night', emoji: '🌙' };
}

/* ====== Toasts ====== */
function toast(msg, type='success') {
  const div = el(`<div class="toast ${type}">${escapeHtml(msg)}</div>`);
  $('#toast-container').appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transform = 'translateX(100%)'; div.style.transition = '.2s'; }, 2200);
  setTimeout(() => div.remove(), 2500);
}

/* ====== Modal ====== */
function openModal(innerHtml, opts={}) {
  closeModal();
  const wrap = el(`<div class="modal-backdrop"><div class="modal ${opts.large?'lg':''}"></div></div>`);
  wrap.querySelector('.modal').innerHTML = innerHtml;
  $('#modal-root').appendChild(wrap);
  wrap.addEventListener('click', (e) => { if (e.target === wrap) closeModal(); });
  if (opts.onOpen) opts.onOpen(wrap.querySelector('.modal'));
  return wrap.querySelector('.modal');
}
function closeModal() { $('#modal-root').innerHTML = ''; }

/* ====== Confirm ====== */
function confirmDialog(msg, onYes) {
  openModal(`
    <h3>Confirm</h3>
    <p class="sub">${escapeHtml(msg)}</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-danger" id="yesBtn">Yes, Continue</button>
    </div>
  `, { onOpen(m) {
    m.querySelector('#cancelBtn').onclick = closeModal;
    m.querySelector('#yesBtn').onclick = () => { closeModal(); onYes(); };
  }});
}

/* ====== Download file helper ====== */
function downloadFile(filename, content, mime='application/json') {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}


/* Add data-label attribute to all table cells based on their header.
   This powers the mobile card-style table layout (responsive.css). */
function autoLabelTableCells() {
  document.querySelectorAll('table.tbl').forEach(table => {
    const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
    if (!headers.length) return;
    table.querySelectorAll('tbody tr').forEach(tr => {
      Array.from(tr.children).forEach((td, i) => {
        if (headers[i] && !td.hasAttribute('data-label')) {
          td.setAttribute('data-label', headers[i]);
        }
      });
    });
  });
}

/* Run after any DOM change in #app */
(function setupAutoLabel() {
  if (typeof MutationObserver === 'undefined') return;
  const target = document.getElementById('app') || document.body;
  if (!target) return;
  let pending = false;
  const obs = new MutationObserver(() => {
    if (pending) return;
    pending = true;
    setTimeout(() => { autoLabelTableCells(); pending = false; }, 50);
  });
  // Wait for DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      const t = document.getElementById('app') || document.body;
      if (t) obs.observe(t, { childList: true, subtree: true });
    });
  } else {
    obs.observe(target, { childList: true, subtree: true });
  }
})();

/* === Universal print helper — bulletproof version ===
   Inlines all images (data URLs) and styles so print window has zero load time.
   Works perfectly with thermal printers and all browsers. */
async function printElement(elementOrSelector, options) {
  options = options || {};
  let el;
  if (typeof elementOrSelector === 'string') {
    el = document.querySelector(elementOrSelector);
  } else {
    el = elementOrSelector;
  }
  if (!el) { alert('Print content not found'); return; }

  // Clone the element to manipulate safely
  const clone = el.cloneNode(true);

  // Step 1: Convert all canvases to images
  const sourceCanvases = el.querySelectorAll ? el.querySelectorAll('canvas') : [];
  const cloneCanvases = clone.querySelectorAll('canvas');
  cloneCanvases.forEach((cv, i) => {
    if (sourceCanvases[i]) {
      try {
        const img = document.createElement('img');
        img.src = sourceCanvases[i].toDataURL('image/png');
        img.width = sourceCanvases[i].width;
        img.height = sourceCanvases[i].height;
        cv.parentNode.replaceChild(img, cv);
      } catch(e) {}
    }
  });

  // Step 2: Convert all <img> src to absolute URLs OR data URLs
  const images = clone.querySelectorAll('img');
  const imagePromises = [];
  images.forEach(img => {
    const src = img.getAttribute('src');
    if (!src) return;
    // Already data URL? Skip
    if (src.startsWith('data:')) return;
    // Make absolute URL
    const absUrl = new URL(src, location.href).href;
    img.src = absUrl;
    // Convert to data URL using fetch (works for same-origin)
    imagePromises.push(
      fetch(absUrl)
        .then(r => r.blob())
        .then(blob => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => { img.src = reader.result; resolve(); };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        }))
        .catch(() => { /* leave URL as-is */ })
    );
  });
  await Promise.all(imagePromises);

  // Step 3: Get HTML with all images inlined
  const html = clone.outerHTML;

  // Step 4: Inline ALL stylesheets
  let styleText = '';
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules) {
        styleText += rule.cssText + '\n';
      }
    } catch(e) {
      // External stylesheet — fetch it
      if (sheet.href) {
        try {
          const r = await fetch(sheet.href);
          if (r.ok) styleText += await r.text() + '\n';
        } catch(e) {}
      }
    }
  }

  // Step 5: Open print window with everything pre-loaded
  const win = window.open('', '_blank', 'width=420,height=700');
  if (!win) { alert('Please allow popups for printing!'); return; }

  const printDoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${options.title || 'Print'}</title>
<style>
${styleText}
/* === Print overrides — MAX VISIBILITY === */
* { box-sizing: border-box; }
html, body {
  margin: 0 !important; padding: 0 !important;
  background: #fff !important; color: #000 !important;
  font-family: Arial, 'Helvetica Neue', sans-serif !important;
}
.no-print, .modal-backdrop, .modal-footer, .modal > div:first-child[class*="no-print"] { display: none !important; }
.invoice-page {
  display: block !important;
  visibility: visible !important;
  color: #000 !important;
  background: #fff !important;
  font-family: Arial, sans-serif !important;
  font-weight: 600 !important;
  padding: 8px !important;
  margin: 0 auto !important;
  max-width: 100% !important;
}
.invoice-page * {
  color: #000 !important;
  visibility: visible !important;
}
.invoice-page h2 { font-weight: 900 !important; }
.invoice-page b, .invoice-page strong { font-weight: 900 !important; }
.qty-circle {
  background: #fff !important;
  color: #000 !important;
  border: 4px solid #000 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  flex-direction: column !important;
  margin: 14px auto !important;
}
.qty-circle * { color: #000 !important; }
.del-type-pill {
  background: #fff !important;
  color: #000 !important;
  border: 2px solid #000 !important;
}
img {
  max-width: 100%;
  display: inline-block;
  visibility: visible !important;
}
table { width: 100%; border-collapse: collapse; }
.print-slip {
  page-break-inside: avoid;
  page-break-after: always;
  break-after: page;
  display: block !important;
  margin: 0 auto;
}
.print-slip:last-child { page-break-after: auto; break-after: auto; }
.print-page-break { page-break-after: always; break-after: page; height: 0; }
@media print {
  @page { margin: 4mm; size: auto; }
  body { padding: 0 !important; background: #fff !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
@media screen {
  body { padding: 20px; background: #f0f4ff; }
  .invoice-page { box-shadow: 0 4px 12px rgba(0,0,0,.1); border-radius: 8px; max-width: 380px; }
}
</style>
</head><body>
${html}
<script>
  // Wait for all images to load before printing
  function doPrint() {
    setTimeout(function() {
      window.print();
      setTimeout(function() { window.close(); }, 1000);
    }, 200);
  }
  window.onload = function() {
    const imgs = document.querySelectorAll('img');
    if (imgs.length === 0) { doPrint(); return; }
    let loaded = 0;
    const checkAll = function() {
      loaded++;
      if (loaded >= imgs.length) doPrint();
    };
    imgs.forEach(function(img) {
      if (img.complete && img.naturalHeight !== 0) checkAll();
      else { img.onload = checkAll; img.onerror = checkAll; }
    });
    // Fallback timeout
    setTimeout(doPrint, 3000);
  };
</` + `script>
</body></html>`;

  win.document.open();
  win.document.write(printDoc);
  win.document.close();
}


/* ============================================================
   Product image helper — handles both emoji + image URLs/data
   ============================================================ */
function productImageHTML(image, size, classes) {
  size = size || 80;
  classes = classes || '';
  const fallback = '🧺';
  const img = image || fallback;
  // If it's a URL or data URI, render as <img> that fills its container
  if (typeof img === 'string' && (img.startsWith('data:') || img.startsWith('http') || img.startsWith('/') || img.startsWith('assets/'))) {
    return `<img src="${img}" class="${classes}" onerror="this.outerHTML='<span>${fallback}</span>'" alt=""/>`;
  }
  // Otherwise treat as emoji/text — let CSS handle size
  return `<span>${img}</span>`;
}
window.productImageHTML = productImageHTML;

/* ============================================================
   Image resize: file -> data URL of <= maxW x maxH, JPEG
   ============================================================ */
function resizeImageToDataURL(file, maxW, maxH, quality) {
  maxW = maxW || 200; maxH = maxH || 200; quality = quality || 0.85;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        // white bg for transparent PNGs
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error('Invalid image'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('Read failed'));
    reader.readAsDataURL(file);
  });
}
window.resizeImageToDataURL = resizeImageToDataURL;

function drawInvoiceQRs(root, data, s) {

  $$('.invQR', root).forEach(canvas => {
    try { QRCode.toCanvas(canvas, data, { scale: 2, border: 1 }); } catch(e){}
  });

function doPrint(includeOffice) {
  // Find the print area in current modal
  const printArea = document.getElementById('printArea');
  if (!printArea) { alert('Print content not ready'); return; }

  // Build temporary element with only what we want to print
  const wrap = document.createElement('div');
  wrap.id = 'printWrapper';
  // Clone first slip (customer copy)
  const slips = printArea.querySelectorAll('.print-slip');
  if (slips.length > 0) wrap.appendChild(slips[0].cloneNode(true));
  // Add office copy only if requested
  if (includeOffice && slips.length > 1) {
    const breakDiv = document.createElement('div');
    breakDiv.className = 'print-page-break';
    wrap.appendChild(breakDiv);
    wrap.appendChild(slips[1].cloneNode(true));
  }

  // Use universal printElement helper
  if (typeof printElement === 'function') {
    printElement(wrap, { title: 'Invoice Print' });
  } else {
    alert('Print helper not loaded. Refresh page.');
  }
}

/* ============================================================
   CUSTOMER COPY (Page 1 — Full details)
   ============================================================ */
function buildCustomerSlip(o, c, cashier, s, invoiceNo, totalPcs, delTypeInfo) {
  const showLogo = s.invoiceShowLogo !== false;
  const showAddress = s.invoiceShowAddress !== false;
  const showPhone = s.invoiceShowPhone !== false;
  const showTagline = s.invoiceShowTagline !== false;
  const showCashier = s.invoiceShowCashier !== false;
  const showQR = s.invoiceShowQR !== false;
  const showDelType = s.invoiceShowDeliveryType !== false;
  const showItems = s.invoiceShowItemBreakdown !== false;
  const showPayMethod = s.invoiceShowPaymentMethod !== false;
  const showDiscount = s.invoiceShowDiscount !== false;
  const showNotes = s.invoiceShowNotes !== false;
  const showFooter = s.invoiceShowFooter !== false;
  const showEdited = s.invoiceShowEditedBadge !== false;
  const showQtyCircle = s.invoiceQtyCircle !== false;
  const showTerms = s.invoiceShowTerms === true;
  // Bumping default sizes to make it clearer for thermal
  const fontSize = Math.max(12, Math.min(24, (+s.invoiceFontSize || 13) + 2));
  const width = Math.max(280, Math.min(800, +s.invoiceWidth || 360));

  const itemsHtml = (o.items || []).map(it => `
    <tr>
      <td style="padding:6px 0;font-size:${fontSize+1}px;font-weight:bold;">${escapeHtml(it.name)}<br><span style="font-size:${fontSize-1}px;font-weight:normal;">${it.qty} × ${fmtMoney(it.price)}</span></td>
      <td style="text-align:right;padding:6px 0;font-size:${fontSize+1}px;font-weight:bold;">${fmtMoney(it.qty*it.price)}</td>
    </tr>
  `).join('');

  const logoBlock = showLogo ? (s.logoImage
    ? `<div style="text-align:center;margin-bottom:8px;"><img src="${s.logoImage}" style="max-width:${Math.min(200,width*0.6)}px;max-height:100px;object-fit:contain;background:#fff;padding:4px;"/></div>`
    : `<div style="text-align:center;font-size:${fontSize+18}px;font-weight:900;line-height:1.2;">${escapeHtml(s.shopName)}</div>`) : '';

/* ============================================================
   WHATSAPP INVOICE
   ============================================================ */
function sendWhatsAppInvoice(o, c, s, invoiceNo, totalPcs, delTypeInfo) {
  if (!c.phone) { toast('Customer phone number missing', 'error'); return; }

  // Clean phone: digits only, with country code
  let phone = c.phone.replace(/[^\d+]/g, '');
  if (phone.startsWith('+')) phone = phone.substring(1);
  // PK pattern: 03XXXXXXXXX (11 digits) -> 923XXXXXXXXX
  if (phone.startsWith('0') && phone.length === 11) phone = '92' + phone.substring(1);

  const itemsText = (o.items || [])
    .map(it => `• ${it.name} × ${it.qty} = ${fmtMoney(it.qty * it.price)}`)
    .join('\n');

  const template = s.whatsappTemplate || `Hello {name}, thank you for your order at {shop}!

Invoice: {invoice}
Total Pcs: {pcs}
Amount: {total}
Paid: {paid}
Due: {due}
Delivery: {delivery} ({type})

{footer}`;

  const vars = {
    '{name}':     c.name,
    '{shop}':     s.shopName,
    '{invoice}':  invoiceNo,
    '{pcs}':      totalPcs,
    '{items}':    itemsText,
    '{subtotal}': fmtMoney(o.subtotal),
    '{discount}': fmtMoney(o.discount || 0),
    '{total}':    fmtMoney(o.total),
    '{paid}':     fmtMoney(o.paid),
    '{due}':      fmtMoney(o.due),
    '{delivery}': o.deliveryDate || '-',
    '{type}':     delTypeInfo.label,
    '{phone}':    s.phone || '',
    '{address}':  s.address || '',
    '{footer}':   s.invoiceFooter || 'Thank You!'
  };

  let msg = template;
  Object.entries(vars).forEach(([k,v]) => { msg = msg.split(k).join(v); });

  // Open preview dialog so user can edit before sending
  openModal(`
    <h3>📱 Send Invoice via WhatsApp</h3>
    <p class="sub">Sending to: <b>${escapeHtml(c.name)}</b> (${escapeHtml(c.phone)}) → WhatsApp: <code>+${phone}</code></p>
    <div class="field">
      <label>Message Preview (you can edit before sending)</label>
      <textarea id="waMsg" rows="14" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;">${escapeHtml(msg)}</textarea>
    </div>
    <div style="background:var(--surface-alt);padding:10px;border-radius:8px;font-size:12px;color:var(--text-soft);margin-bottom:14px;">
      💡 Clicking <b>Send</b> opens WhatsApp Web (on PC) or the WhatsApp app (on phone) with this message pre-filled. You just need to press the send arrow there.
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-secondary" id="copyBtn">📋 Copy Text</button>
      <button class="btn btn-success" id="sendBtn">📱 Open WhatsApp</button>
    </div>
  `, { large: true, onOpen(m) {
    $('#copyBtn', m).onclick = () => {
      const text = $('#waMsg', m).value;
      navigator.clipboard.writeText(text).then(() => toast('Message copied to clipboard','success'));
    };
    $('#sendBtn', m).onclick = () => {
      const text = $('#waMsg', m).value;
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
      toast('Opening WhatsApp...', 'success');
      closeModal();
    };
  }});
}
