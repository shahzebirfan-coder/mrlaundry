<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Laundry — Owner Dashboard</title>
  <meta name="theme-color" content="#4f7cff" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7fb;color:#0f172a;min-height:100vh}.wrap{max-width:1320px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#4f7cff,#6a5cff);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 12px 28px rgba(79,124,255,.28)}h1{font-size:clamp(25px,4vw,40px);letter-spacing:-.04em;line-height:1.05}.sub{color:#64748b;margin-top:5px;font-size:14px}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid #dbeafe;background:#eff6ff;color:#1d4ed8;padding:10px 13px;border-radius:999px;font-weight:800;font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 6px rgba(34,197,94,.15)}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}button{border:0;border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer;background:#4f7cff;color:#fff;box-shadow:0 10px 20px rgba(79,124,255,.22)}button.secondary{background:#fff;color:#334155;border:1px solid #e2e8f0;box-shadow:none}button.good{background:#16a34a}button.warn{background:#d97706}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.card{background:#fff;border:1px solid #e5eaf2;border-radius:22px;padding:18px;box-shadow:0 16px 45px rgba(15,23,42,.06)}.stat{position:relative;overflow:hidden;min-height:132px;display:flex;flex-direction:column;justify-content:space-between}.stat:after{content:"";position:absolute;right:-35px;top:-35px;width:130px;height:130px;border-radius:50%;background:var(--soft,#eff6ff)}.ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--main,#4f7cff);color:#fff;position:relative;z-index:1}.lbl{color:#64748b;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-top:12px}.val{font-size:clamp(25px,3vw,36px);font-weight:950;letter-spacing:-.04em;margin-top:2px;color:var(--main,#4f7cff);position:relative;z-index:1}.hint{font-size:12px;color:#94a3b8;margin-top:4px;position:relative;z-index:1}.blue{--main:#4f7cff;--soft:#dbeafe}.green{--main:#16a34a;--soft:#dcfce7}.orange{--main:#d97706;--soft:#fef3c7}.red{--main:#dc2626;--soft:#fee2e2}.purple{--main:#7c3aed;--soft:#ede9fe}.slate{--main:#334155;--soft:#f1f5f9}.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}.section-title{font-weight:950;font-size:18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}input,select,textarea{width:100%;border:1px solid #d8e0ec;border-radius:12px;padding:12px 13px;font:inherit;background:#fff;color:#0f172a}textarea{min-height:86px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.field label{display:block;font-size:12px;font-weight:900;color:#64748b;text-transform:uppercase;margin-bottom:6px}.ai{background:linear-gradient(135deg,#eef2ff,#f8fafc);border:1px solid #c7d2fe}.examples{font-size:12px;color:#64748b;line-height:1.7;margin-top:8px}.preview{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:12px;margin:10px 0;color:#334155;font-size:13px;line-height:1.6}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:13px 16px;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.25);z-index:99;max-width:360px}.toast.good{background:#065f46}.toast.err{background:#991b1b}table{width:100%;border-collapse:collapse;font-size:14px}th{text-align:left;color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.05em;background:#f8fafc}th,td{padding:12px;border-bottom:1px solid #eef2f7}td b{font-weight:950}.right{text-align:right}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;text-transform:capitalize}.pending{background:#fef3c7;color:#92400e}.washing{background:#dbeafe;color:#1d4ed8}.ready,.received{background:#dcfce7;color:#166534}.delivered,.invoiced{background:#ede9fe;color:#6d28d9}.paid{background:#dcfce7;color:#166534}.empty{padding:30px;text-align:center;color:#64748b}.loader{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px}.spin{width:48px;height:48px;border-radius:50%;border:5px solid #dbeafe;border-top-color:#4f7cff;animation:spin .85s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.error{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;padding:14px;border-radius:16px;margin-bottom:14px;line-height:1.5}@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}}@media(max-width:640px){.wrap{padding:14px}.grid,.row{grid-template-columns:1fr}.actions{width:100%}.actions button,.actions .pill{flex:1;justify-content:center}.table-scroll{overflow-x:auto}table{min-width:680px}}
  </style>
</head>
<body>
  <div id="root"><div class="loader"><div class="spin"></div><h2>Loading Owner Dashboard...</h2><p class="sub">Connecting to Firebase</p></div></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = { apiKey:'AIzaSyDU5jnvxfvqIB-JoVZzRUSLJdxZgJ2tiuY', authDomain:'mr-laundry-pos-a6740.firebaseapp.com', projectId:'mr-laundry-pos-a6740', storageBucket:'mr-laundry-pos-a6740.firebasestorage.app', messagingSenderId:'927434668958', appId:'1:927434668958:web:2516175f4046edcfbcf48f' };
    const SHOP_ID='shahzeb-laundry-private-pos';
    const MAX_DOC_SIZE=800000;
    let db, unsub, lastData=null, lastUpdated=null, adminUser=null;
    const CATS={rent:'🏠 Rent',salary:'👤 Salary',utilities:'💡 Utilities',supplies:'🧴 Supplies',maintenance:'🔧 Maintenance',transport:'🚚 Transport',marketing:'📢 Marketing',tax:'🧾 Tax',food:'🍵 Food',rawmaterial:'🧺 Raw Material',other:'📦 Other'};

    function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
    function money(n){return 'Rs. '+Math.round(Number(n||0)).toLocaleString('en-PK');}
    function dayKey(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    function rowDate(v){return (v||'').slice(0,10)}
    function safeDate(v){const d=new Date(v||Date.now());return isNaN(d)?new Date():d}
    function id(prefix){return prefix+Date.now().toString(36)+Math.floor(Math.random()*1000)}
    function toast(msg,type='good'){const el=document.createElement('div');el.className='toast '+(type==='err'?'err':'good');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),4200)}
    function customerName(data,cid){return (data.customers||[]).find(c=>c.id===cid)?.name||'Walk-in'}
    function vendorName(data,vid){return (data.vendors||[]).find(v=>v.id===vid)?.name||'-'}

    async function getMainMeta(){const mainRef=db.collection('shops').doc(SHOP_ID);const mainDoc=await mainRef.get();if(!mainDoc.exists)throw new Error('No cloud data found');return {mainRef,meta:mainDoc.data()}}
    async function loadTable(tbl,metaObj){const {mainRef,meta}=metaObj||await getMainMeta();if(meta._format==='chunked-v1'&&meta.tables){const info=meta.tables[tbl];if(!info)return undefined;const ref=mainRef.collection('tables');if((info.chunks||1)===1){const doc=await ref.doc(tbl).get();return doc.exists?JSON.parse(doc.data().data):undefined}const docs=await Promise.all(Array.from({length:info.chunks},(_,i)=>ref.doc(`${tbl}__c${i}`).get()));const chunks=docs.map(d=>d.exists?d.data().data:null);if(!chunks.every(x=>x!=null))throw new Error('Missing chunks for '+tbl);return JSON.parse(chunks.join(''))}if(meta.data){const all=JSON.parse(meta.data);return all[tbl]}return undefined}
    async function writeTable(tbl,value,metaObj){const {mainRef}=metaObj||await getMainMeta();const ref=mainRef.collection('tables');const json=JSON.stringify(value??null);const version=Date.now();let info;if(json.length<MAX_DOC_SIZE){info={chunks:1,size:json.length};await ref.doc(tbl).set({data:json,chunks:1,version,deviceId:'owner_dashboard',updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}else{const chunks=Math.ceil(json.length/MAX_DOC_SIZE);info={chunks,size:json.length};for(let i=0;i<chunks;i++)await ref.doc(`${tbl}__c${i}`).set({data:json.substr(i*MAX_DOC_SIZE,MAX_DOC_SIZE),chunkIndex:i,totalChunks:chunks,parent:tbl,version,deviceId:'owner_dashboard',updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}return info}
    async function updateMeta(tableInfos,admin){const {mainRef,meta}=await getMainMeta();const version=Date.now();const tables=Object.assign({},meta.tables||{},tableInfos);await mainRef.set({tables,version,deviceId:'owner_dashboard',deviceLabel:'Owner Dashboard',updatedBy:admin?.username||'owner',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),_format:'chunked-v1'},{merge:true});return version}
    async function loadCompact(){const doc=await db.collection('shops').doc(SHOP_ID).collection('tables').doc('_liveDashboard').get();if(!doc.exists||!doc.data().data)return null;lastUpdated=doc.data().updatedAt?.toDate?doc.data().updatedAt.toDate():new Date();return JSON.parse(doc.data().data)}
    async function loadDashboardData(){const metaObj=await getMainMeta();const [settings,orders,customers,expenses,vendors,purchaseOrders]=await Promise.all(['settings','orders','customers','expenses','vendors','purchaseOrders'].map(t=>loadTable(t,metaObj).catch(()=>[])));lastUpdated=metaObj.meta.updatedAt?.toDate?metaObj.meta.updatedAt.toDate():new Date();return {settings:settings||{},orders:orders||[],customers:customers||[],expenses:expenses||[],vendors:vendors||[],purchaseOrders:purchaseOrders||[]}}
    async function loadFullBackup(){const metaObj=await getMainMeta();const names=Object.keys(metaObj.meta.tables||{}).filter(t=>!t.startsWith('_'));const out={};await Promise.all(names.map(async t=>out[t]=await loadTable(t,metaObj)));out._backupInfo={exportedAt:new Date().toISOString(),source:'owner.html',shopId:SHOP_ID};return out}
    async function updateCompactFromFull(){const d=await loadDashboardData();const compact={_liveCompact:true,generatedAt:new Date().toISOString(),settings:d.settings,customers:(d.customers||[]).map(c=>({id:c.id,name:c.name,phone:c.phone})),orders:(d.orders||[]).map(o=>({id:o.id,invoiceNo:o.invoiceNo,customerId:o.customerId,total:+o.total||0,paid:+o.paid||0,due:+o.due||0,status:o.status,createdAt:o.createdAt,bookingDate:o.bookingDate,paymentMethod:o.paymentMethod,cashierUsername:o.cashierUsername,cashierName:o.cashierName,paymentsLog:o.paymentsLog||[]})),expenses:d.expenses||[],vendors:d.vendors||[],purchaseOrders:d.purchaseOrders||[]};await db.collection('shops').doc(SHOP_ID).collection('tables').doc('_liveDashboard').set({data:JSON.stringify(compact),version:Date.now(),deviceId:'owner_dashboard',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),_format:'live-dashboard-v1'});return compact}

    async function requireAdmin(){if(adminUser)return adminUser;const cached=sessionStorage.getItem('ownerAdminAuth');if(cached){try{const a=JSON.parse(cached);if(Date.now()-a.at<30*60*1000){adminUser=a.user;return adminUser}}catch(e){}}
      const username=prompt('Admin username:'); if(!username)throw new Error('Admin login cancelled'); const password=prompt('Admin password:'); if(!password)throw new Error('Admin login cancelled');
      const users=await loadTable('users').catch(()=>[])||[]; const u=users.find(x=>x.username===username&&x.password===password&&x.role==='admin'); if(!u)throw new Error('Invalid admin username/password');
      adminUser={id:u.id,username:u.username,name:u.name||u.username}; sessionStorage.setItem('ownerAdminAuth',JSON.stringify({at:Date.now(),user:adminUser})); return adminUser}

    function buildStats(data){const orders=(data.orders||[]).filter(o=>!o._deleted), expenses=(data.expenses||[]).filter(e=>!e._deleted), pos=(data.purchaseOrders||[]).filter(p=>!p._deleted);const today=dayKey(), month=today.slice(0,7);const orderDay=o=>o.bookingDate||rowDate(o.createdAt);const expDay=e=>e.date||rowDate(e.createdAt);const todayOrders=orders.filter(o=>orderDay(o)===today||rowDate(o.createdAt)===today);const todaySale=todayOrders.reduce((s,o)=>s+(+o.total||0),0);const todayDue=todayOrders.reduce((s,o)=>s+(+o.due||0),0);const pays=[];for(const o of orders){for(const p of (o.paymentsLog||[])){if(rowDate(p.at)===today)pays.push({...p,orderId:o.id,invoiceNo:o.invoiceNo,customerId:o.customerId})}}for(const o of todayOrders){const logged=(o.paymentsLog||[]).reduce((s,p)=>s+(+p.amount||0),0);const first=(+o.paid||0)-logged;if(first>0)pays.push({amount:first,method:o.paymentMethod||'cash',at:o.createdAt,invoiceNo:o.invoiceNo,customerId:o.customerId,orderId:o.id})}pays.sort((a,b)=>(b.at||'').localeCompare(a.at||''));const recovery=pays.reduce((s,p)=>s+(+p.amount||0),0);const todayExp=expenses.filter(e=>expDay(e)===today).reduce((s,e)=>s+(+e.amount||0),0);const pending=orders.filter(o=>['pending','washing','ready'].includes(o.status)).length;const totalOutstanding=orders.reduce((s,o)=>s+(+o.due||0),0);const todayPO=pos.filter(p=>(p.date||rowDate(p.createdAt))===today);const poDue=pos.reduce((s,p)=>s+(+p.due||0),0);return {today,todayOrders,todaySale,todayDue,pays,recovery,todayExp,net:recovery-todayExp,pending,totalOutstanding,todayPO,poDue,recentOrders:[...orders].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,8),recentExpenses:[...expenses].filter(e=>expDay(e)===today).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,8),recentPO:[...pos].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,8),monthOrders:orders.filter(o=>(orderDay(o)||'').slice(0,7)===month),monthExp:expenses.filter(e=>(expDay(e)||'').slice(0,7)===month).reduce((s,e)=>s+(+e.amount||0),0)}}

    function titleCase(str){return String(str||'').trim().split(/\s+/).filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')}
    function detectExpenseCategory(txt){txt=(txt||'').toLowerCase();if(/chai|tea|food|khana|nashta|lunch|dinner|staff/.test(txt))return 'food';if(/petrol|fuel|rider|transport|bike|delivery|car|riksha/.test(txt))return 'transport';if(/salary|wage|mazdoori|staff|worker|imran|asif/.test(txt))return 'salary';if(/rent|kiraya|shop rent/.test(txt))return 'rent';if(/electric|bijli|gas|water|bill|utility|kesc|ke/.test(txt))return 'utilities';if(/detergent|surf|chemical|hanger|shopper|raw|material|plastic|bag/.test(txt))return 'rawmaterial';if(/repair|maintenance|service|fix|machine/.test(txt))return 'maintenance';if(/ad|ads|marketing|banner|printing|pamphlet/.test(txt))return 'marketing';if(/tax|fee|government|govt/.test(txt))return 'tax';return 'other'}
    function parseExpenseText(txt){txt=(txt||'').toLowerCase().trim();const nums=txt.match(/\d+(?:\.\d+)?/g)||[];const amount=nums.length?+nums[nums.length-1]:0;const category=detectExpenseCategory(txt);let d=new Date();if(/kal|yesterday/.test(txt))d.setDate(d.getDate()-1);if(/parso|day before/.test(txt))d.setDate(d.getDate()-2);const method=/jazz|easypaisa|bank|card|cash/.test(txt)?(txt.match(/jazzcash|jazz|easypaisa|bank|card|cash/)||[''])[0]:'';const title=txt.replace(/\d+(?:\.\d+)?/g,'').replace(/\b(kal|yesterday|today|aaj|parso|cash|jazzcash|jazz|easypaisa|bank|card)\b/g,'').trim().replace(/\s+/g,' ')||'Expense';return {title:titleCase(title),amount,category,date:dayKey(d),note:txt+(method?' • '+method:'')}}
    function fillExpense(){const p=parseExpenseText(document.getElementById('expAi').value);document.getElementById('expTitle').value=p.title;document.getElementById('expAmount').value=p.amount||'';document.getElementById('expCat').value=p.category;document.getElementById('expDate').value=p.date;document.getElementById('expNote').value=p.note;document.getElementById('expPreview').innerHTML=`<b>AI Read:</b> ${esc(p.title)} • ${money(p.amount)} • ${CATS[p.category]} • ${p.date}`}
    function isDuplicateExpense(expenses,rec){return (expenses||[]).some(e=>(e.date||'')===rec.date && Math.round(+e.amount||0)===Math.round(+rec.amount||0) && String(e.title||'').toLowerCase().trim()===String(rec.title||'').toLowerCase().trim())}
    async function saveExpense(){try{const admin=await requireAdmin();const title=document.getElementById('expTitle').value.trim(),amount=+document.getElementById('expAmount').value,category=document.getElementById('expCat').value,date=document.getElementById('expDate').value,note=document.getElementById('expNote').value.trim();if(!title||amount<=0)throw new Error('Enter title and amount');const metaObj=await getMainMeta();const expenses=await loadTable('expenses',metaObj)||[];const now=new Date().toISOString();const rec={id:id('e'),title,amount,category,note,date,branchId:'main',createdAt:now,updatedAt:now,addedFrom:'owner.html',username:admin.username,userName:admin.name};if(isDuplicateExpense(expenses,rec)&&!confirm('Same expense already exists for this date/amount/title. Save anyway?'))return;expenses.push(rec);const info=await writeTable('expenses',expenses,metaObj);await updateMeta({expenses:info},admin);lastData=await updateCompactFromFull();render(lastData);toast('Expense added and synced')}catch(e){toast(e.message,'err')}}
    function parseBulkExpenses(){const txt=document.getElementById('bulkExpText')?.value||'';return txt.split(/\n|;/).map(x=>x.trim()).filter(Boolean).map(parseExpenseText).filter(x=>x.amount>0)}
    function previewBulkExpenses(){const list=parseBulkExpenses();const total=list.reduce((s,e)=>s+e.amount,0);document.getElementById('bulkPreview').innerHTML=list.length?`<b>${list.length} expenses detected • Total ${money(total)}</b><br>`+list.map(e=>`${esc(e.date)} — ${esc(CATS[e.category])} — ${esc(e.title)} — <b>${money(e.amount)}</b>`).join('<br>'):'Paste multiple expenses, one per line.'}
    async function saveBulkExpenses(){try{const admin=await requireAdmin();const list=parseBulkExpenses();if(!list.length)throw new Error('No valid expenses found');const metaObj=await getMainMeta();const expenses=await loadTable('expenses',metaObj)||[];const dup=list.filter(r=>isDuplicateExpense(expenses,r));if(dup.length&&!confirm(`${dup.length} duplicate expense(s) found. Save anyway?`))return;const now=new Date().toISOString();list.forEach(r=>expenses.push({id:id('e'),...r,branchId:'main',createdAt:now,updatedAt:now,addedFrom:'owner.html-bulk',username:admin.username,userName:admin.name}));const info=await writeTable('expenses',expenses,metaObj);await updateMeta({expenses:info},admin);lastData=await updateCompactFromFull();render(lastData);toast(`${list.length} expenses saved and synced`)}catch(e){toast(e.message,'err')}}

    function currentVendor(){const vid=document.getElementById('poVendor')?.value;return (lastData?.vendors||[]).find(v=>v.id===vid)||null}
    function vendorRates(v){return Object.assign({big:0,medium:0,small:0},(v&&v.poRates)||{})}
    function fillVendorRates(){const r=vendorRates(currentVendor());['big','medium','small'].forEach(k=>{const el=document.getElementById('poRate_'+k);if(el)el.value=r[k]||''});previewPOBMS()}
    function getPOBMSItems(){const labels={big:'Big Clothes',medium:'Medium Clothes',small:'Small Clothes'};return ['big','medium','small'].map(k=>{const qty=+document.getElementById('poQty_'+k)?.value||0,rate=+document.getElementById('poRate_'+k)?.value||0;return {key:k,name:labels[k],qty,rate}}).filter(i=>i.qty>0)}
    function previewPOBMS(){const items=getPOBMSItems();const total=items.reduce((s,i)=>s+i.qty*i.rate,0);const qty=items.reduce((s,i)=>s+i.qty,0);document.getElementById('poPreview').innerHTML=items.length?`<b>Items:</b> ${items.map(i=>`${esc(i.name)} ${i.qty} × ${money(i.rate)} = ${money(i.qty*i.rate)}`).join('<br>')}<br><b>Total Pcs:</b> ${qty} &nbsp; <b>Total:</b> ${money(total)}`:'Vendor select kar ke Big / Medium / Small quantity enter karein. Rates auto-fill from vendor saved rates, editable hain.';}
    function parseSmartPOText(){const txt=(document.getElementById('poAiText')?.value||'').toLowerCase();if(!txt.trim())return;const vendors=lastData?.vendors||[];let found=vendors.find(v=>txt.includes(String(v.name||'').toLowerCase()));if(found){document.getElementById('poVendor').value=found.id;fillVendorRates()}const get=(words)=>{for(const w of words){const m=txt.match(new RegExp(w+'\\s*(?:cloths?|kapray|kapre)?\\s*(\\d+)','i'));if(m)return +m[1];}return 0};const big=get(['big','bara','baray','large']);const medium=get(['medium','mid']);const small=get(['small','chota','chotay']);if(big)document.getElementById('poQty_big').value=big;if(medium)document.getElementById('poQty_medium').value=medium;if(small)document.getElementById('poQty_small').value=small;const paid=(txt.match(/paid\s*(\d+)|advance\s*(\d+)|pay\s*(\d+)/i)||[]).filter(Boolean).pop();if(paid)document.getElementById('poPaid').value=paid;if(/received/.test(txt))document.getElementById('poStatus').value='received';if(/invoice|invoiced/.test(txt))document.getElementById('poStatus').value='invoiced';if(/paid full|full paid/.test(txt))document.getElementById('poStatus').value='paid';document.getElementById('poNotes').value=txt;previewPOBMS()}
    async function savePO(){try{const admin=await requireAdmin();const vendorId=document.getElementById('poVendor').value;if(!vendorId)throw new Error('Select vendor');const items=getPOBMSItems();if(!items.length)throw new Error('Enter quantity for Big, Medium, or Small Clothes');for(const it of items){if(it.rate<=0)throw new Error(it.name+' rate required. Enter per pc cost.')}const rates={big:+document.getElementById('poRate_big').value||0,medium:+document.getElementById('poRate_medium').value||0,small:+document.getElementById('poRate_small').value||0};const paid=+document.getElementById('poPaid').value||0,date=document.getElementById('poDate').value,status=document.getElementById('poStatus').value,notes=document.getElementById('poNotes').value.trim();const metaObj=await getMainMeta();const [purchaseOrders,counters,vendors]=await Promise.all([loadTable('purchaseOrders',metaObj).then(x=>x||[]),loadTable('_counters',metaObj).then(x=>x||{}),loadTable('vendors',metaObj).then(x=>x||[])]);const vi=vendors.findIndex(v=>v.id===vendorId);if(vi>=0)vendors[vi]={...vendors[vi],poRates:rates,updatedAt:new Date().toISOString()};const maxPO=Math.max(1000,+counters.po||1000,...purchaseOrders.map(p=>parseInt(String(p.poNo||'').replace(/\D/g,''),10)||0));const poNo=(counters.po=maxPO+1);const total=items.reduce((s,i)=>s+i.qty*i.rate,0),safePaid=Math.min(total,Math.max(0,paid));const now=new Date().toISOString();purchaseOrders.push({id:id('p'),poNo,vendorId,date,items:items.map(({key,...x})=>x),clothSummary:{big:+document.getElementById('poQty_big').value||0,medium:+document.getElementById('poQty_medium').value||0,small:+document.getElementById('poQty_small').value||0},vendorRates:rates,total,paid:safePaid,due:total-safePaid,status:(total-safePaid===0?'paid':status),notes,userId:admin.id,createdAt:now,updatedAt:now,addedFrom:'owner.html'});const poInfo=await writeTable('purchaseOrders',purchaseOrders,metaObj);const cInfo=await writeTable('_counters',counters,metaObj);const vInfo=await writeTable('vendors',vendors,metaObj);await updateMeta({purchaseOrders:poInfo,_counters:cInfo,vendors:vInfo},admin);lastData=await updateCompactFromFull();render(lastData);toast('Purchase Order added and vendor rates saved')}catch(e){toast(e.message,'err')}}

    async function downloadBackup(){try{await requireAdmin();toast('Preparing full backup...');const b=await loadFullBackup();const blob=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`mr-laundry-owner-backup-${dayKey()}-${Date.now()}.json`;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}catch(e){toast(e.message,'err')}}

    function aiSummaryHTML(data,st){const notes=[];if(st.net<0)notes.push('Aaj net cash negative hai — expenses recovery se zyada hain.');else notes.push('Aaj net cash positive hai: '+money(st.net)+'.');if(st.todaySale>0&&st.recovery<st.todaySale*0.7)notes.push('Recovery today sale ke muqable kam hai; dues follow-up karein.');if(st.todayExp>st.recovery*0.5&&st.recovery>0)notes.push('Expenses recovery ke 50% se zyada hain — verify entries.');if(st.poDue>0)notes.push('Vendor PO outstanding: '+money(st.poDue)+'.');if(!notes.length)notes.push('All key numbers look normal.');return `<div class="card ai" style="margin-bottom:18px;"><div class="section-title">🧠 AI Daily Summary <small>owner quick review</small></div><div class="preview">${notes.map(n=>'• '+esc(n)).join('<br>')}</div></div>`}

    function render(data){lastData=data;const s=data.settings||{},st=buildStats(data),now=new Date();document.getElementById('root').innerHTML=`<div class="wrap"><div class="top"><div class="brand"><div class="logo">🧺</div><div><h1>${esc(s.shopName||'Mr Laundry')} Owner Dashboard</h1><p class="sub">${esc(s.address||'Karachi')} • ${esc(s.phone||'+923343691210')}</p></div></div><div class="actions"><div class="pill"><span class="dot"></span> Firebase Live Sync</div><div class="pill">🕒 ${now.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</div><button class="secondary" onclick="downloadBackup()">Download Backup</button><button onclick="refreshAll()">Refresh</button></div></div>
      <div class="grid"><div class="card stat blue"><div class="ic">🛒</div><div><div class="lbl">Aaj Orders</div><div class="val">${st.todayOrders.length}</div><div class="hint">Total bookings today</div></div></div><div class="card stat green"><div class="ic">💰</div><div><div class="lbl">Total Sale Today</div><div class="val">${money(st.todaySale)}</div><div class="hint">Aaj ki billed sale</div></div></div><div class="card stat orange"><div class="ic">✅</div><div><div class="lbl">Recovery Today</div><div class="val">${money(st.recovery)}</div><div class="hint">Payment received</div></div></div><div class="card stat red"><div class="ic">💸</div><div><div class="lbl">Expenses Today</div><div class="val">${money(st.todayExp)}</div><div class="hint">Aaj ke kharchay</div></div></div></div>
      <div class="grid"><div class="card stat ${st.net>=0?'green':'red'}"><div class="ic">📈</div><div><div class="lbl">Net Cash Today</div><div class="val">${money(st.net)}</div><div class="hint">Recovery - expenses</div></div></div><div class="card stat purple"><div class="ic">⏳</div><div><div class="lbl">Pending Orders</div><div class="val">${st.pending}</div><div class="hint">Pending/washing/ready</div></div></div><div class="card stat slate"><div class="ic">🏦</div><div><div class="lbl">Total Outstanding</div><div class="val">${money(st.totalOutstanding)}</div><div class="hint">All invoice due</div></div></div><div class="card stat orange"><div class="ic">📑</div><div><div class="lbl">PO Due</div><div class="val">${money(st.poDue)}</div><div class="hint">Vendor outstanding</div></div></div></div>
      ${aiSummaryHTML(data,st)}
      <div class="layout"><div class="card ai"><div class="section-title">🤖 AI Expense Entry <small>simple words se expense add</small></div><textarea id="expAi" placeholder="Example: chai staff 500 / petrol rider 2000 kal / detergent 3500"></textarea><div class="actions" style="margin:10px 0"><button onclick="fillExpense()">AI Fill</button><button class="good" onclick="saveExpense()">Save Expense</button></div><div class="row"><div class="field"><label>Title</label><input id="expTitle"></div><div class="field"><label>Amount</label><input id="expAmount" type="number"></div></div><div class="row"><div class="field"><label>Category</label><select id="expCat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div><div class="field"><label>Date</label><input id="expDate" type="date" value="${dayKey()}"></div></div><div class="field"><label>Note</label><input id="expNote"></div><div id="expPreview" class="preview">Type expense above then click AI Fill.</div><div class="examples">Examples: <b>chai staff 500</b>, <b>petrol rider 2000 kal</b>, <b>salary imran 15000</b></div><hr style="border:0;border-top:1px solid #dbe4f0;margin:14px 0"><div class="section-title" style="font-size:15px;margin-bottom:8px">⚡ Bulk Daily Expenses</div><textarea id="bulkExpText" placeholder="chai staff 500&#10;petrol rider 1200&#10;detergent 3500"></textarea><div class="actions" style="margin:10px 0"><button class="secondary" onclick="previewBulkExpenses()">Preview Bulk</button><button class="good" onclick="saveBulkExpenses()">Save All Expenses</button></div><div id="bulkPreview" class="preview">Paste multiple expenses, one per line.</div></div>
      <div class="card"><div class="section-title">📑 Easy Purchase Order Entry <small>Big / Medium / Small Clothes</small></div><textarea id="poAiText" placeholder="AI PO example: abc laundry big 10 medium 20 small 30 paid 1000"></textarea><div class="actions" style="margin:10px 0"><button class="secondary" onclick="parseSmartPOText()">AI Fill PO</button></div><div class="row"><div class="field"><label>Vendor</label><select id="poVendor" onchange="fillVendorRates()">${(data.vendors||[]).map(v=>`<option value="${v.id}">🏭 ${esc(v.name)}</option>`).join('')}</select></div><div class="field"><label>Date</label><input id="poDate" type="date" value="${dayKey()}"></div></div><div class="preview"><b>Smart Rates:</b> Vendor select karte hi saved per-pc rates auto-fill honge. First time rate blank ho to yahin enter karein — save ke baad vendor ke saath rate remember ho jayega.</div><div class="row"><div class="field"><label>Number of BIG Clothes</label><input id="poQty_big" type="number" min="0" placeholder="0" oninput="previewPOBMS()"></div><div class="field"><label>Big per pc cost</label><input id="poRate_big" type="number" min="0" value="${((data.vendors||[])[0]?.poRates?.big)||''}" placeholder="Rate" oninput="previewPOBMS()"></div></div><div class="row"><div class="field"><label>Number of MEDIUM Clothes</label><input id="poQty_medium" type="number" min="0" placeholder="0" oninput="previewPOBMS()"></div><div class="field"><label>Medium per pc cost</label><input id="poRate_medium" type="number" min="0" value="${((data.vendors||[])[0]?.poRates?.medium)||''}" placeholder="Rate" oninput="previewPOBMS()"></div></div><div class="row"><div class="field"><label>Number of SMALL Clothes</label><input id="poQty_small" type="number" min="0" placeholder="0" oninput="previewPOBMS()"></div><div class="field"><label>Small per pc cost</label><input id="poRate_small" type="number" min="0" value="${((data.vendors||[])[0]?.poRates?.small)||''}" placeholder="Rate" oninput="previewPOBMS()"></div></div><div class="row"><div class="field"><label>Paid</label><input id="poPaid" type="number" value="0" oninput="previewPOBMS()"></div><div class="field"><label>Status</label><select id="poStatus"><option value="pending">Pending</option><option value="received">Received</option><option value="invoiced">Invoiced</option><option value="paid">Paid</option></select></div></div><div class="field"><label>Notes</label><input id="poNotes" placeholder="Bag #, vendor slip, etc."></div><div id="poPreview" class="preview">Vendor select kar ke quantity enter karein.</div><button class="good" onclick="savePO()">Save Purchase Order</button></div></div>
      <div class="layout"><div class="card"><div class="section-title">🕒 Recent Orders</div><div class="table-scroll"><table><thead><tr><th>Invoice</th><th>Customer</th><th>Status</th><th class="right">Total</th><th class="right">Paid</th></tr></thead><tbody>${st.recentOrders.length?st.recentOrders.map(o=>`<tr><td><b>${o.invoiceNo?'INV-'+esc(o.invoiceNo):'#'+esc(String(o.id||'').slice(-6))}</b></td><td>${esc(customerName(data,o.customerId))}</td><td><span class="badge ${esc(o.status||'pending')}">${esc(o.status||'pending')}</span></td><td class="right"><b>${money(o.total)}</b></td><td class="right">${money(o.paid)}</td></tr>`).join(''):'<tr><td colspan="5" class="empty">No orders</td></tr>'}</tbody></table></div></div><div class="card"><div class="section-title">💸 Today Expenses</div><div class="table-scroll"><table><thead><tr><th>Title</th><th>Category</th><th class="right">Amount</th></tr></thead><tbody>${st.recentExpenses.length?st.recentExpenses.map(e=>`<tr><td><b>${esc(e.title||'Expense')}</b><br><small class="sub">${esc(e.note||'')}</small></td><td>${esc(CATS[e.category]||e.category||'Other')}</td><td class="right"><b>${money(e.amount)}</b></td></tr>`).join(''):'<tr><td colspan="3" class="empty">No expenses today</td></tr>'}</tbody></table></div></div></div>
      <div class="card"><div class="section-title">📑 Recent Purchase Orders</div><div class="table-scroll"><table><thead><tr><th>PO#</th><th>Vendor</th><th>Date</th><th>Items</th><th class="right">Total</th><th class="right">Due</th><th>Status</th></tr></thead><tbody>${st.recentPO.length?st.recentPO.map(p=>`<tr><td><b>${esc(p.poNo)}</b></td><td>${esc(vendorName(data,p.vendorId))}</td><td>${esc(p.date||'')}</td><td>${(p.items||[]).length} types</td><td class="right"><b>${money(p.total)}</b></td><td class="right">${money(p.due)}</td><td><span class="badge ${esc(p.status||'pending')}">${esc(p.status||'pending')}</span></td></tr>`).join(''):'<tr><td colspan="7" class="empty">No purchase orders</td></tr>'}</tbody></table></div></div>
      <p class="sub" style="text-align:center;margin:18px 0 8px">Last cloud update: ${lastUpdated?lastUpdated.toLocaleString():'—'} • Owner tools sync directly to main POS • Shop ID: ${SHOP_ID}</p></div>`}
    function renderError(err){document.getElementById('root').innerHTML=`<div class="wrap"><div class="error"><b>Owner dashboard error:</b><br>${esc(err.message||err)}</div><button onclick="location.reload()">Reload</button></div>`}
    async function refreshAll(){try{render(await loadDashboardData());toast('Refreshed')}catch(e){renderError(e)}}
    async function init(){if(!navigator.onLine)throw new Error('Internet required');if(!window.firebase)throw new Error('Firebase SDK could not load');firebase.initializeApp(firebaseConfig);db=firebase.firestore();const liveRef=db.collection('shops').doc(SHOP_ID).collection('tables').doc('_liveDashboard');unsub=liveRef.onSnapshot(async snap=>{try{if(snap.exists&&snap.data().data){lastUpdated=snap.data().updatedAt?.toDate?snap.data().updatedAt.toDate():new Date();const d=JSON.parse(snap.data().data);if(!d.vendors||!d.purchaseOrders){return render(await loadDashboardData())}return render(d)}render(await loadDashboardData())}catch(e){renderError(e)}},renderError);loadCompact().then(d=>{if(d)render(d)}).catch(()=>{});}
    window.addEventListener('online',()=>refreshAll());window.addEventListener('offline',()=>renderError(new Error('Internet disconnected')));init().catch(renderError);
  </script>
</body>
