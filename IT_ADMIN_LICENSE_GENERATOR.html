<!DOCTYPE html>
<html>
<head>
  <title>License Generator (IT ADMIN)</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    input { padding: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Generate License File</h2>
    <label>Extension Days:</label>
    <input type="number" id="days" value="30" />
    <button onclick="generate()">Download License (.lic)</button>
  </div>
  <script>
    function generate() {
      let days = document.getElementById('days').value;
      if (!days || days <= 0) return alert("Enter valid days");
      let data = { extensionDays: parseInt(days), generatedAt: Date.now() };
      let blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      let url = URL.createObjectURL(blob);
      let a = document.createElement("a");
      a.href = url;
      a.download = `license_${days}_days.lic`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
