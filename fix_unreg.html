<!DOCTYPE html>
<html>
<body>
<button onclick="unregister()">Force SW Reset</button>
<script>
  function unregister() {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for(let registration of registrations) {
        registration.unregister();
      }
      alert("Done! Service workers cleared.");
    });
  }
</script>
</body>
</html>
